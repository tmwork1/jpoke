name: test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov ruff mypy papermill ipykernel

      - name: Register Jupyter kernel for notebook examples
        run: python -m ipykernel install --user --name python3

      - name: Run tests (with coverage on ubuntu / 3.12)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python -m pytest tests/ -q --cov=jpoke --cov-report=term

      - name: Run tests
        if: "!(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12')"
        run: python -m pytest tests/ -q

      - name: Run ruff
        run: python -m ruff check src/ tests/ scripts/ examples/

      - name: Run mypy
        run: python -m mypy

  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Install built wheel
        run: pip install dist/*.whl

      - name: Import from outside the repo
        # cwd の src/ を拾わないよう /tmp で実行し、wheel からのみ import できることを確認する
        run: cd /tmp && python -c "import jpoke; print(jpoke.__version__)"
